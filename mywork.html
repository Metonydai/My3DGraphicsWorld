<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mywork - My 3D Graphics World</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header id="header-container" class="main-header"></header>

    <div class="page-layout">
        
        <main class="main-content" id="mywork-list-container"></main>

        <aside id="sidebar-container" class="sidebar"></aside>

    </div>

    <footer class="main-footer">
        <p>&copy; 2026 Tony Dai. All rights reserved.</p>
    </footer>

    <script src="projects.js"></script>
    <script src="common.js"></script>
    <script>

            document.addEventListener("DOMContentLoaded", () => {
                // 1. 載入 Header
                loadComponent("header-container", "header.html", () => {
                    const activeNav = document.getElementById("nav-mywork");
                    if (activeNav) activeNav.classList.add("active");

                    setupLanguageSwitcher();
                });

                // 2. 載入 Sidebar
                loadComponent("sidebar-container", "sidebar.html", () => {
                    initSidebar("Articles/"); 
                });

                // 3. 核心功能：檢查網址有沒有帶 ?category=... 參數
                const urlParams = new URLSearchParams(window.location.search);
                const categoryFilter = urlParams.get('category'); // 拿到 "Vulkan" 或 "Blender / DCC"

                // 4. 根據有沒有參數，來篩選要顯示的文章
                let displayProjects = window.GLOBAL_PROJECTS;
                if (categoryFilter) {
                    // 如果有指定分類，就過濾出該分類的文章
                    displayProjects = window.GLOBAL_PROJECTS.filter(p => getLangText(p.category) === categoryFilter);
                }

                // 5. 渲染文章列表
                const listContainer = document.getElementById("mywork-list-container");
                if (listContainer && displayProjects) {
                    listContainer.innerHTML = ""; // 先清空舊內容
                    
                    if (displayProjects.length === 0) {
                        listContainer.innerHTML = `<p>No articles found under "${categoryFilter}".</p>`;
                    } else {
                        displayProjects.forEach(project => {
                            const titleText = getLangText(project.title);
                            const descText = getLangText(project.description);
                            const catText = getLangText(project.category);

                            listContainer.innerHTML += `
                                <article class="blog-post-summary" style="margin-bottom: 30px;">
                                    <h2 class="summary-title"><a href="post-loader.html?id=${project.id}">${titleText}</a></h2>
                                    <p class="post-meta">Date: ${project.date} | Category: ${catText}</p>
                                    <div class="summary-body">
                                        <p>${descText}</p>
                                    </div>
                                    <a href="post-loader.html?id=${project.id}" class="read-more-btn">Read More →</a>
                                </article>
                            `;
                        });
                    }
                }
            });
        </script>
</body>
</html>
